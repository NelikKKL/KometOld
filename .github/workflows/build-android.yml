name: Build Android

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - '.github/workflows/build-android.yml'
  pull_request:
    paths:
      - 'lib/**'
      - 'android/**'
      - 'pubspec.yaml'
      - '.github/workflows/build-android.yml'

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Configure Gradle
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m" >> ~/.gradle/gradle.properties
          echo "kotlin.daemon.jvmargs=-Xmx1536m" >> ~/.gradle/gradle.properties

      # ── Подпись: используем release-ключ если есть секреты, иначе debug ──

      - name: Setup release keystore (if secrets set)
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
            echo "HAS_KEYSTORE=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_KEYSTORE=false" >> $GITHUB_OUTPUT
            echo "⚠️  No KEYSTORE_BASE64 secret found — building with debug signing"
          fi

      - name: Write key.properties (release signing)
        if: steps.keystore.outputs.HAS_KEYSTORE == 'true'
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=../app/release.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      # Если нет release-ключа — переключаем buildType на debug-signing в release
      - name: Patch build.gradle for debug signing fallback
        if: steps.keystore.outputs.HAS_KEYSTORE == 'false'
        run: |
          # Добавляем signingConfig = signingConfigs.getByName("debug") в release buildType
          # используя sed — патчим только если нет keystore
          sed -i 's/getByName("release") {/getByName("release") {\n            signingConfig = signingConfigs.getByName("debug")/' \
            android/app/build.gradle.kts

      - name: Build APK (release)
        run: flutter build apk --release 2>&1 | tee build_apk.log
        continue-on-error: true
        id: build_apk

      - name: Build App Bundle (release)
        if: steps.build_apk.outcome == 'success'
        run: flutter build appbundle --release 2>&1 | tee build_aab.log
        continue-on-error: true
        id: build_aab

      # ── Артефакты при успехе ──────────────────────────────────────────────

      - name: Upload APK artifact
        if: steps.build_apk.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: komet-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload App Bundle artifact
        if: steps.build_aab.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: komet-android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── Сбор логов при ошибке ─────────────────────────────────────────────

      - name: Collect error logs
        if: failure() || steps.build_apk.outcome == 'failure'
        run: |
          mkdir -p error_logs

          [ -f build_apk.log ] && cp build_apk.log error_logs/ || true
          [ -f build_aab.log ] && cp build_aab.log error_logs/ || true

          find . -path "*/build/reports" -type d | while read d; do
            cp -r "$d" error_logs/gradle_reports 2>/dev/null || true
          done

          find ~/.gradle -name "*.log" 2>/dev/null | head -5 | while read f; do
            cp "$f" error_logs/ 2>/dev/null || true
          done

          flutter doctor -v > error_logs/flutter_doctor.txt 2>&1 || true
          [ -f pubspec.lock ] && cp pubspec.lock error_logs/ || true

          echo "=== Files in error_logs ===" && ls -lh error_logs/

      - name: Upload error logs
        if: failure() || steps.build_apk.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: android-build-error-logs
          path: error_logs/
          retention-days: 7

      - name: Fail if build failed
        if: steps.build_apk.outcome == 'failure'
        run: |
          echo "❌ Android build failed. Download 'android-build-error-logs' artifact for details."
          exit 1
